# ============================================================
# Octopus Max EZ - ShopAssistant TEST RIG (DEMO-STABLE v3)
# NO SENSORLESS HOMING
#
# - kinematics: none (manual_steppers)
# - Dual gantry: gantry1 + gantry2 (SYNC moves)
# - Horizontal: horiz
# - Cakes: cake1..cake6 (cake1 wired now)
#
# Boot ritual (no endstops):
#   SA_INIT
#   SA_ZERO_ALL CAKE=1
# After that, system is "HOMED" and go-to macros are allowed.
# ============================================================

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_07002F001351313531383332-if00
restart_method: command

[printer]
kinematics: none
max_velocity: 30000
max_accel: 10000

# =========================
# STEPPERS (pins)
# =========================

[manual_stepper gantry1]
step_pin: PC13
dir_pin: !PC14
enable_pin: !PE6
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 3200
velocity: 20000
accel: 50000

[tmc2209 manual_stepper gantry1]
uart_pin: PG14
run_current: 0.90
hold_current: 0.50
stealthchop_threshold: 0

[manual_stepper gantry2]
step_pin: PE4
dir_pin: !PE5
enable_pin: !PE3
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 3200
velocity: 20000
accel: 50000

[tmc2209 manual_stepper gantry2]
uart_pin: PG13
run_current: 0.90
hold_current: 0.50
stealthchop_threshold: 0

[manual_stepper horiz]
step_pin: PB8
dir_pin: PB9
enable_pin: !PB7
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 3200
velocity: 20000
accel: 50000

[tmc2209 manual_stepper horiz]
uart_pin: PG11
run_current: 0.90
hold_current: 0.50
stealthchop_threshold: 0

[manual_stepper cake1]
step_pin: PE1
dir_pin: PE0
enable_pin: !PE2
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 3200
velocity: 15000
accel: 30000

[tmc2209 manual_stepper cake1]
uart_pin: PG12
run_current: 0.90
hold_current: 0.50
stealthchop_threshold: 0

# Placeholders for future cakes (fill pins when ready)
# [manual_stepper cake2] ...
# [tmc2209 manual_stepper cake2] ...
# ... cake3..cake6

# =========================
# CONFIG + STATE
# =========================

[gcode_macro SA_CFG]
# Gantry Z cake heights (steps from Z0)
variable_z_cake1: 35000
variable_z_cake2: 0
variable_z_cake3: 0
variable_z_cake4: 0
variable_z_cake5: 0
variable_z_cake6: 0

# Horizontal presets (steps from X_LEFT=0)
variable_x_center: 48000
# Right move from center; keep symmetric by default:
variable_x_center_to_right: -48000

# Cake slot steps
variable_cake1_slot: 21333
variable_cake2_slot: 21333
variable_cake3_slot: 21333
variable_cake4_slot: 21333
variable_cake5_slot: 21333
variable_cake6_slot: 21333

# Software clamps (single-command safety)
variable_gantry_max_abs: 120000
variable_horiz_max_abs:  120000
variable_cake_max_abs:   200000

# Default speeds/accels for macro moves
variable_gantry_speed: 20000
variable_gantry_accel: 50000
variable_horiz_speed:  20000
variable_horiz_accel:  50000
variable_cake_speed:   15000
variable_cake_accel:   30000
gcode:
  ; storage only

[gcode_macro SA_STATE]
variable_is_homed: 0
gcode:
  ; storage only

# =========================
# REQUIRED HOMED GUARD
# =========================
[gcode_macro SA_REQUIRE_HOMED]
gcode:
  {% if printer["gcode_macro SA_STATE"].is_homed|int != 1 %}
    {action_raise_error("NOT_HOMED: run SA_ZERO_ALL first")}
  {% endif %}

# =========================
# INTERNAL MOVE HELPERS
# =========================

[gcode_macro _SA_GANTRY_MOVE]
gcode:
  {% set d = params.DELTA|int %}
  {% set lim = printer["gcode_macro SA_CFG"].gantry_max_abs|int %}
  {% if d|abs > lim %}
    {action_raise_error("GANTRY_DELTA_TOO_LARGE " ~ d)}
  {% endif %}
  MANUAL_STEPPER STEPPER=gantry1 SET_POSITION=0
  MANUAL_STEPPER STEPPER=gantry2 SET_POSITION=0
  MANUAL_STEPPER STEPPER=gantry1 MOVE={d} SYNC=0 SPEED={printer["gcode_macro SA_CFG"].gantry_speed} ACCEL={printer["gcode_macro SA_CFG"].gantry_accel}
  MANUAL_STEPPER STEPPER=gantry2 MOVE={d} SYNC=1 SPEED={printer["gcode_macro SA_CFG"].gantry_speed} ACCEL={printer["gcode_macro SA_CFG"].gantry_accel}
  M400
  MANUAL_STEPPER STEPPER=gantry1 SET_POSITION=0
  MANUAL_STEPPER STEPPER=gantry2 SET_POSITION=0

[gcode_macro _SA_HORIZ_MOVE]
gcode:
  {% set d = params.DELTA|int %}
  {% set lim = printer["gcode_macro SA_CFG"].horiz_max_abs|int %}
  {% if d|abs > lim %}
    {action_raise_error("HORIZ_DELTA_TOO_LARGE " ~ d)}
  {% endif %}
  MANUAL_STEPPER STEPPER=horiz SET_POSITION=0
  MANUAL_STEPPER STEPPER=horiz MOVE={d} SPEED={printer["gcode_macro SA_CFG"].horiz_speed} ACCEL={printer["gcode_macro SA_CFG"].horiz_accel}
  M400
  MANUAL_STEPPER STEPPER=horiz SET_POSITION=0

[gcode_macro _SA_CAKE_MOVE]
gcode:
  {% set c = params.CAKE|int %}
  {% set d = params.DELTA|int %}
  {% if c < 1 or c > 6 %}
    {action_raise_error("CAKE must be 1..6")}
  {% endif %}
  {% set lim = printer["gcode_macro SA_CFG"].cake_max_abs|int %}
  {% if d|abs > lim %}
    {action_raise_error("CAKE_DELTA_TOO_LARGE " ~ d)}
  {% endif %}
  MANUAL_STEPPER STEPPER={"cake" ~ c} SET_POSITION=0
  MANUAL_STEPPER STEPPER={"cake" ~ c} MOVE={d} SPEED={printer["gcode_macro SA_CFG"].cake_speed} ACCEL={printer["gcode_macro SA_CFG"].cake_accel}
  M400
  MANUAL_STEPPER STEPPER={"cake" ~ c} SET_POSITION=0

# =========================
# PUBLIC API MACROS
# =========================

[gcode_macro SA_INIT]
gcode:
  RESPOND PREFIX=SA MSG="INIT_OK HOMED={printer['gcode_macro SA_STATE'].is_homed} z1={printer['gcode_macro SA_CFG'].z_cake1} xc={printer['gcode_macro SA_CFG'].x_center} c1slot={printer['gcode_macro SA_CFG'].cake1_slot}"

# --- soft zero / homing ---
[gcode_macro SA_ZERO_GANTRY]
gcode:
  MANUAL_STEPPER STEPPER=gantry1 SET_POSITION=0
  MANUAL_STEPPER STEPPER=gantry2 SET_POSITION=0
  RESPOND PREFIX=SA MSG="GANTRY_Z0_SET"

[gcode_macro SA_ZERO_HORIZ]
gcode:
  MANUAL_STEPPER STEPPER=horiz SET_POSITION=0
  RESPOND PREFIX=SA MSG="HORIZ_LEFT_SET"

[gcode_macro SA_ZERO_CAKE]
gcode:
  {% set c = params.CAKE|int %}
  MANUAL_STEPPER STEPPER={"cake" ~ c} SET_POSITION=0
  RESPOND PREFIX=SA MSG="CAKE{c}_ZERO_SET"

[gcode_macro SA_ZERO_ALL]
gcode:
  SA_ZERO_GANTRY
  SA_ZERO_HORIZ
  {% if 'CAKE' in params %}
    SA_ZERO_CAKE CAKE={params.CAKE|int}
  {% endif %}
  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=is_homed VALUE=1
  RESPOND PREFIX=SA MSG="ZERO_ALL_DONE HOMED=1"

[gcode_macro SA_UNHOME]
description: Force un-homed (useful after a bump or power-cycle)
gcode:
  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=is_homed VALUE=0
  RESPOND PREFIX=SA MSG="HOMED=0"

# --- setters (store distances centrally) ---
[gcode_macro SA_SET_Z_CAKE]
description: SA_SET_Z_CAKE CAKE=1 STEPS=35000
gcode:
  {% set c = params.CAKE|int %}
  {% set s = params.STEPS|int %}
  SET_GCODE_VARIABLE MACRO=SA_CFG VARIABLE={"z_cake" ~ c} VALUE={s}
  RESPOND PREFIX=SA MSG="Z_CAKE{c}_SET={s}"

[gcode_macro SA_SET_X_CENTER]
description: SA_SET_X_CENTER STEPS=48000
gcode:
  {% set s = params.STEPS|int %}
  SET_GCODE_VARIABLE MACRO=SA_CFG VARIABLE=x_center VALUE={s}
  RESPOND PREFIX=SA MSG="X_CENTER_SET={s}"

[gcode_macro SA_SET_X_CENTER_TO_RIGHT]
description: SA_SET_X_CENTER_TO_RIGHT STEPS=-48000
gcode:
  {% set s = params.STEPS|int %}
  SET_GCODE_VARIABLE MACRO=SA_CFG VARIABLE=x_center_to_right VALUE={s}
  RESPOND PREFIX=SA MSG="X_CENTER_TO_RIGHT_SET={s}"

[gcode_macro SA_SET_CAKE_SLOT]
description: SA_SET_CAKE_SLOT CAKE=1 STEPS=21333
gcode:
  {% set c = params.CAKE|int %}
  {% set s = params.STEPS|int %}
  SET_GCODE_VARIABLE MACRO=SA_CFG VARIABLE={"cake" ~ c ~ "_slot"} VALUE={s}
  RESPOND PREFIX=SA MSG="CAKE{c}_SLOT_SET={s}"

# --- manual jog ---
[gcode_macro SA_GANTRY_JOG]
description: SA_GANTRY_JOG DELTA=2000
gcode:
  {% set d = params.DELTA|int %}
  _SA_GANTRY_MOVE DELTA={d}
  RESPOND PREFIX=SA MSG="GANTRY_JOG={d}"

[gcode_macro SA_HORIZ_JOG]
description: SA_HORIZ_JOG DELTA=2000
gcode:
  {% set d = params.DELTA|int %}
  _SA_HORIZ_MOVE DELTA={d}
  RESPOND PREFIX=SA MSG="HORIZ_JOG={d}"

[gcode_macro SA_CAKE_JOG]
description: SA_CAKE_JOG CAKE=1 DELTA=2000
gcode:
  {% set c = params.CAKE|int %}
  {% set d = params.DELTA|int %}
  _SA_CAKE_MOVE CAKE={c} DELTA={d}
  RESPOND PREFIX=SA MSG="CAKE{c}_JOG={d}"

# --- go-to primitives (require homed) ---
[gcode_macro SA_GOTO_CAKE]
description: SA_GOTO_CAKE CAKE=1
gcode:
  SA_REQUIRE_HOMED
  {% set c = params.CAKE|int %}
  {% set z = printer["gcode_macro SA_CFG"]["z_cake" ~ c]|int %}
  _SA_GANTRY_MOVE DELTA={z}
  RESPOND PREFIX=SA MSG="GANTRY_AT_CAKE{c}={z}"

[gcode_macro SA_GOTO_Z0]
description: SA_GOTO_Z0 CAKE=1
gcode:
  SA_REQUIRE_HOMED
  {% set c = params.CAKE|int %}
  {% set z = printer["gcode_macro SA_CFG"]["z_cake" ~ c]|int %}
  _SA_GANTRY_MOVE DELTA={-z}
  RESPOND PREFIX=SA MSG="GANTRY_AT_Z0_FROM_CAKE{c}"

[gcode_macro SA_GOTO_X]
description: SA_GOTO_X POS=LEFT|CENTER|RIGHT
gcode:
  SA_REQUIRE_HOMED
  {% set pos = params.POS|upper %}
  {% set xc = printer["gcode_macro SA_CFG"].x_center|int %}
  {% set xr = printer["gcode_macro SA_CFG"].x_center_to_right|int %}
  {% if pos == "LEFT" %}
    RESPOND PREFIX=SA MSG="HORIZ_AT_LEFT (ZERO)"
  {% elif pos == "CENTER" %}
    _SA_HORIZ_MOVE DELTA={xc}
    RESPOND PREFIX=SA MSG="HORIZ_AT_CENTER={xc}"
  {% elif pos == "RIGHT" %}
    _SA_HORIZ_MOVE DELTA={xc}
    _SA_HORIZ_MOVE DELTA={xr}
    RESPOND PREFIX=SA MSG="HORIZ_AT_RIGHT (CENTER+RIGHT)"
  {% else %}
    {action_raise_error("POS must be LEFT|CENTER|RIGHT")}
  {% endif %}

# --- cake steps ---
[gcode_macro SA_CAKE_STEP]
description: SA_CAKE_STEP CAKE=1 DIR=CW|CCW
gcode:
  SA_REQUIRE_HOMED
  {% set c = params.CAKE|int %}
  {% set dir = params.DIR|default("CW")|upper %}
  {% set slot = printer["gcode_macro SA_CFG"]["cake" ~ c ~ "_slot"]|int %}
  {% if dir == "CW" %}
    _SA_CAKE_MOVE CAKE={c} DELTA={slot}
    RESPOND PREFIX=SA MSG="CAKE{c}_STEP_CW={slot}"
  {% elif dir == "CCW" %}
    _SA_CAKE_MOVE CAKE={c} DELTA={-slot}
    RESPOND PREFIX=SA MSG="CAKE{c}_STEP_CCW={slot}"
  {% else %}
    {action_raise_error("DIR must be CW|CCW")}
  {% endif %}

[gcode_macro SA_CAKE_MOVE]
description: SA_CAKE_MOVE CAKE=1 STEPS=21333
gcode:
  SA_REQUIRE_HOMED
  {% set c = params.CAKE|int %}
  {% set s = params.STEPS|int %}
  _SA_CAKE_MOVE CAKE={c} DELTA={s}
  RESPOND PREFIX=SA MSG="CAKE{c}_MOVE={s}"

# --- high-level concise tests ---
[gcode_macro SA_DISPENSE_TEST]
description: SA_DISPENSE_TEST CAKE=1 DIR=CW
gcode:
  SA_REQUIRE_HOMED
  {% set c = params.CAKE|default(1)|int %}
  {% set dir = params.DIR|default("CW")|upper %}
  RESPOND PREFIX=SA MSG="DISPENSE_START CAKE={c} DIR={dir}"
  SA_GOTO_X POS=CENTER
  SA_GOTO_CAKE CAKE={c}
  SA_CAKE_STEP CAKE={c} DIR={dir}
  SA_GOTO_Z0 CAKE={c}
  SA_GOTO_X POS=RIGHT
  RESPOND PREFIX=SA MSG="DISPENSE_DONE"

[gcode_macro SA_RETURN_TEST]
description: SA_RETURN_TEST CAKE=1
gcode:
  SA_REQUIRE_HOMED
  {% set c = params.CAKE|default(1)|int %}
  RESPOND PREFIX=SA MSG="RETURN_START CAKE={c}"
  SA_GOTO_X POS=CENTER
  SA_GOTO_CAKE CAKE={c}
  SA_CAKE_STEP CAKE={c} DIR=CCW
  SA_GOTO_Z0 CAKE={c}
  SA_GOTO_X POS=RIGHT
  RESPOND PREFIX=SA MSG="RETURN_DONE"