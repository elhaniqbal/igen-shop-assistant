[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_07002F001351313531383332-if00
restart_method: command

[printer]
kinematics: none
max_velocity: 30000
max_accel: 10000

[respond]

[save_variables]
filename: ~/printer_data/config/saved_vars.cfg

[idle_timeout]
timeout: 60
gcode:
  SA_DISABLE_ALL