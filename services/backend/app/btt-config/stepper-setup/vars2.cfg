# ============================================================
# ShopAssistant Runtime Variables + Machine Geometry
# ============================================================

[gcode_macro SA_STATE]

# -----------------------------
# Machine state
# -----------------------------
variable_homed: 0
variable_x_pos: 0
variable_z_pos: 0
variable_current_slot: 0
variable_cake_zero_valid: 0

# pending user handoff state
variable_pending_handoff: 0
variable_pending_cake: 0
variable_pending_slot: 0

# -----------------------------
# Homing start positions
# -----------------------------
variable_vert_home_start: 800000
variable_horiz_home_start: 160000

# ============================================================
# X/Z COORDINATE CONVENTION
#
# X = 0 at RIGHTMOST side  -> HOME
# X increases moving LEFT
#
# Z = 0 at BOTTOM
# Z increases moving UP
# ============================================================

# -----------------------------
# Main gantry X positions
# -----------------------------

# cake stack center
variable_cake_center_x: 57800

# =============================
# DOOR POSITION (LEFTMOST SIDE)
# TUNE THIS ONE IN LAB
# This is where the user receives / returns tools
# =============================
variable_door_x: 160000
variable_door_z: 0

# optional named leftmost point
variable_leftmost_x: 60000

# home / park at RIGHTMOST side
variable_park_x: 0
variable_park_z: 0

# safe travel height before long X moves
variable_travel_z: 2000

# -----------------------------
# Cake heights
# -----------------------------
variable_cake1_z: 16000
variable_cake2_z: 53000
variable_cake3_z: 98000
variable_cake4_z: 18000
variable_cake5_z: 11000
variable_cake6_z: 4000

# -----------------------------
# Camera pose
# -----------------------------
variable_camera_x: 30000
variable_camera_z: 12000

# -----------------------------
# Cake constants
# 60 deg ~= 21333 step-units
# Effective reduction behaves like ~40:1
# -----------------------------
variable_cake1_steps_per_60: 42666
variable_cake2_steps_per_60: 21333
variable_cake3_steps_per_60: 21333
variable_cake4_steps_per_60: 21333
variable_cake5_steps_per_60: 21333
variable_cake6_steps_per_60: 21333

variable_cake1_dispense_offset: 21333
variable_cake2_dispense_offset: 10666
variable_cake3_dispense_offset: 10666
variable_cake4_dispense_offset: 10666
variable_cake5_dispense_offset: 10666
variable_cake6_dispense_offset: 10666

variable_cake1_return_offset: 9000
variable_cake2_return_offset: 9000
variable_cake3_return_offset: 9000
variable_cake4_return_offset: 9000
variable_cake5_return_offset: 9000
variable_cake6_return_offset: 9000

variable_dwell_ms: 1500

# reserved for future encoder validation
variable_last_encoder_angle: 0
variable_last_encoder_error: 0

gcode: