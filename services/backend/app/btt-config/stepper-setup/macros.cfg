# ============================================================
# BASIC HELPERS
# ============================================================

[gcode_macro SA_ASSERT_HOMED]
gcode:
  {% if printer["gcode_macro SA_STATE"].homed|int != 1 %}
    { action_raise_error("Machine not homed. Run SA_HOME_MACHINE first.") }
  {% endif %}

[gcode_macro SA_ASSERT_CAKE_ZERO]
gcode:
  {% if printer["gcode_macro SA_STATE"].cake_zero_valid|int != 1 %}
    { action_raise_error("Cake logical zero not set. Align slot 0 and run SA_CAKE_SET_ZERO.") }
  {% endif %}

[gcode_macro SA_ENABLE_ALL]
gcode:
  MANUAL_STEPPER STEPPER=gantry1 ENABLE=1
  MANUAL_STEPPER STEPPER=gantry2 ENABLE=1
  MANUAL_STEPPER STEPPER=horiz ENABLE=1
  MANUAL_STEPPER STEPPER=cake ENABLE=1

[gcode_macro SA_DISABLE_ALL]
gcode:
  MANUAL_STEPPER STEPPER=gantry1 ENABLE=0
  MANUAL_STEPPER STEPPER=gantry2 ENABLE=0
  MANUAL_STEPPER STEPPER=horiz ENABLE=0
  MANUAL_STEPPER STEPPER=cake ENABLE=0

[gcode_macro SA_STATUS]
gcode:
  RESPOND PREFIX=SA MSG="homed={printer['gcode_macro SA_STATE'].homed} x={printer['gcode_macro SA_STATE'].x_pos} z={printer['gcode_macro SA_STATE'].z_pos} slot={printer['gcode_macro SA_STATE'].current_slot} cake_zero={printer['gcode_macro SA_STATE'].cake_zero_valid}"

# ============================================================
# HOMING
# ============================================================

[gcode_macro SA_HOME_VERTICAL]
description: Home vertical gantry with dual endstops to square gantry
gcode:
  {% set start = printer["gcode_macro SA_STATE"].vert_home_start|int %}

  MANUAL_STEPPER STEPPER=gantry1 ENABLE=1
  MANUAL_STEPPER STEPPER=gantry2 ENABLE=1

  MANUAL_STEPPER STEPPER=gantry1 SET_POSITION={start}
  MANUAL_STEPPER STEPPER=gantry2 SET_POSITION={start}

  MANUAL_STEPPER STEPPER=gantry1 MOVE=0 SPEED=12000 ACCEL=30000 STOP_ON_ENDSTOP=1 SYNC=0
  MANUAL_STEPPER STEPPER=gantry2 MOVE=0 SPEED=12000 ACCEL=30000 STOP_ON_ENDSTOP=1
  M400

  MANUAL_STEPPER STEPPER=gantry1 SET_POSITION=0
  MANUAL_STEPPER STEPPER=gantry2 SET_POSITION=0

  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=z_pos VALUE=0
  RESPOND PREFIX=SA MSG="VERTICAL_HOMED"

[gcode_macro SA_HOME_HORIZONTAL]
description: Home horizontal gantry to RIGHT endstop
gcode:
  {% set start = printer["gcode_macro SA_STATE"].horiz_home_start|int %}

  MANUAL_STEPPER STEPPER=horiz ENABLE=1
  MANUAL_STEPPER STEPPER=horiz SET_POSITION={start}
  MANUAL_STEPPER STEPPER=horiz MOVE=0 SPEED=12000 ACCEL=30000 STOP_ON_ENDSTOP=1
  M400
  MANUAL_STEPPER STEPPER=horiz SET_POSITION=0

  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=x_pos VALUE=0
  RESPOND PREFIX=SA MSG="HORIZONTAL_HOMED"

[gcode_macro SA_HOME_MACHINE]
description: Home Z then X
gcode:
  SA_ENABLE_ALL
  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=homed VALUE=0
  SA_HOME_VERTICAL
  SA_HOME_HORIZONTAL
  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=homed VALUE=1
  RESPOND PREFIX=SA MSG="MACHINE_HOMED"

# ============================================================
# ABSOLUTE GANTRY MOVES
# ============================================================

[gcode_macro SA_X_MOVE_ABS]
description: Move horizontal gantry to absolute X
gcode:
  SA_ASSERT_HOMED
  MANUAL_STEPPER STEPPER=horiz ENABLE=1
  {% set pos = params.POS|int %}
  MANUAL_STEPPER STEPPER=horiz MOVE={pos} SPEED=15000 ACCEL=30000
  M400
  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=x_pos VALUE={pos}
  RESPOND PREFIX=SA MSG="X_AT={pos}"

[gcode_macro SA_Z_MOVE_ABS]
description: Move vertical gantry to absolute Z with both motors synced
gcode:
  SA_ASSERT_HOMED
  MANUAL_STEPPER STEPPER=gantry1 ENABLE=1
  MANUAL_STEPPER STEPPER=gantry2 ENABLE=1
  {% set pos = params.POS|int %}
  MANUAL_STEPPER STEPPER=gantry1 MOVE={pos} SPEED=12000 ACCEL=30000 SYNC=0
  MANUAL_STEPPER STEPPER=gantry2 MOVE={pos} SPEED=12000 ACCEL=30000
  M400
  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=z_pos VALUE={pos}
  RESPOND PREFIX=SA MSG="Z_AT={pos}"

[gcode_macro SA_MOVE_TO_CAKE]
description: Move gantry to cake 1..6
gcode:
  SA_ASSERT_HOMED

  {% set cake = params.CAKE|int %}
  {% set center_x = printer["gcode_macro SA_STATE"].cake_center_x|int %}

  {% if cake == 1 %}
    {% set z = printer["gcode_macro SA_STATE"].cake1_z|int %}
  {% elif cake == 2 %}
    {% set z = printer["gcode_macro SA_STATE"].cake2_z|int %}
  {% elif cake == 3 %}
    {% set z = printer["gcode_macro SA_STATE"].cake3_z|int %}
  {% elif cake == 4 %}
    {% set z = printer["gcode_macro SA_STATE"].cake4_z|int %}
  {% elif cake == 5 %}
    {% set z = printer["gcode_macro SA_STATE"].cake5_z|int %}
  {% elif cake == 6 %}
    {% set z = printer["gcode_macro SA_STATE"].cake6_z|int %}
  {% else %}
    { action_raise_error("CAKE must be 1..6") }
  {% endif %}

  SA_X_MOVE_ABS POS={center_x}
  SA_Z_MOVE_ABS POS={z}
  RESPOND PREFIX=SA MSG="AT_CAKE={cake}"

[gcode_macro SA_MOVE_TO_CAMERA]
description: Move gantry to inspection camera pose
gcode:
  SA_ASSERT_HOMED
  {% set x = printer["gcode_macro SA_STATE"].camera_x|int %}
  {% set z = printer["gcode_macro SA_STATE"].camera_z|int %}
  SA_X_MOVE_ABS POS={x}
  SA_Z_MOVE_ABS POS={z}
  RESPOND PREFIX=SA MSG="AT_CAMERA"

[gcode_macro SA_PARK]
description: Move gantry to park pose
gcode:
  SA_ASSERT_HOMED
  {% set x = printer["gcode_macro SA_STATE"].park_x|int %}
  {% set z = printer["gcode_macro SA_STATE"].park_z|int %}
  SA_Z_MOVE_ABS POS={z}
  SA_X_MOVE_ABS POS={x}
  RESPOND PREFIX=SA MSG="PARKED"

# ============================================================
# RELATIVE ADMIN JOGS
# ============================================================

[gcode_macro SA_JOG_X_REL]
description: Admin-only relative X jog
gcode:
  SA_ASSERT_HOMED
  MANUAL_STEPPER STEPPER=horiz ENABLE=1
  {% set delta = params.DELTA|int %}
  {% set cur = printer["gcode_macro SA_STATE"].x_pos|int %}
  {% set new = cur + delta %}
  MANUAL_STEPPER STEPPER=horiz MOVE={new} SPEED=10000 ACCEL=20000
  M400
  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=x_pos VALUE={new}
  RESPOND PREFIX=SA MSG="X_JOGGED_TO={new}"

[gcode_macro SA_JOG_Z_REL]
description: Admin-only relative Z jog
gcode:
  SA_ASSERT_HOMED
  MANUAL_STEPPER STEPPER=gantry1 ENABLE=1
  MANUAL_STEPPER STEPPER=gantry2 ENABLE=1
  {% set delta = params.DELTA|int %}
  {% set cur = printer["gcode_macro SA_STATE"].z_pos|int %}
  {% set new = cur + delta %}
  MANUAL_STEPPER STEPPER=gantry1 MOVE={new} SPEED=9000 ACCEL=20000 SYNC=0
  MANUAL_STEPPER STEPPER=gantry2 MOVE={new} SPEED=9000 ACCEL=20000
  M400
  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=z_pos VALUE={new}
  RESPOND PREFIX=SA MSG="Z_JOGGED_TO={new}"

[gcode_macro SA_END_ADMIN_SESSION]
description: Re-home after remote admin/manual movement, then disable
gcode:
  SA_HOME_MACHINE
  SA_DISABLE_ALL
  RESPOND PREFIX=SA MSG="ADMIN_SESSION_CLOSED_REHOMED"

# ============================================================
# CAKE LOGICAL ZERO + SLOTTING
# ============================================================

[gcode_macro SA_CAKE_SET_ZERO]
description: After manually aligning slot 0, declare current cake position as zero
gcode:
  MANUAL_STEPPER STEPPER=cake ENABLE=1
  MANUAL_STEPPER STEPPER=cake SET_POSITION=0
  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=current_slot VALUE=0
  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=cake_zero_valid VALUE=1
  RESPOND PREFIX=SA MSG="CAKE_ZERO_SET"

[gcode_macro SA_CAKE_TO_SLOT]
description: Move cake to slot 0..5 absolute from logical zero
gcode:
  SA_ASSERT_CAKE_ZERO
  MANUAL_STEPPER STEPPER=cake ENABLE=1
  {% set cake = params.CAKE|int %}
  {% set slot = params.SLOT|int %}

  {% if slot < 0 or slot > 5 %}
    { action_raise_error("SLOT must be 0..5") }
  {% endif %}

  {% if cake == 1 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake1_steps_per_60|int %}
  {% elif cake == 2 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake2_steps_per_60|int %}
  {% elif cake == 3 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake3_steps_per_60|int %}
  {% elif cake == 4 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake4_steps_per_60|int %}
  {% elif cake == 5 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake5_steps_per_60|int %}
  {% elif cake == 6 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake6_steps_per_60|int %}
  {% else %}
    { action_raise_error("CAKE must be 1..6") }
  {% endif %}

  {% set target = slot * pitch %}
  MANUAL_STEPPER STEPPER=cake MOVE={target} SPEED=12000 ACCEL=25000
  M400
  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=current_slot VALUE={slot}
  RESPOND PREFIX=SA MSG="CAKE_AT_CAKE={cake}_SLOT={slot}"

[gcode_macro SA_CAKE_NUDGE]
description: Relative cake nudge around current slot base
gcode:
  SA_ASSERT_CAKE_ZERO
  MANUAL_STEPPER STEPPER=cake ENABLE=1
  {% set delta = params.DELTA|int %}
  {% set slot = printer["gcode_macro SA_STATE"].current_slot|int %}
  {% set cake = params.CAKE|default(1)|int %}

  {% if cake == 1 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake1_steps_per_60|int %}
  {% elif cake == 2 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake2_steps_per_60|int %}
  {% elif cake == 3 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake3_steps_per_60|int %}
  {% elif cake == 4 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake4_steps_per_60|int %}
  {% elif cake == 5 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake5_steps_per_60|int %}
  {% elif cake == 6 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake6_steps_per_60|int %}
  {% else %}
    { action_raise_error("CAKE must be 1..6") }
  {% endif %}

  {% set target = slot * pitch + delta %}
  MANUAL_STEPPER STEPPER=cake MOVE={target} SPEED=10000 ACCEL=20000
  M400
  RESPOND PREFIX=SA MSG="CAKE_NUDGED_DELTA={delta}"

# ============================================================
# CAKE OPERATIONS
# ============================================================

[gcode_macro SA_DISPENSE]
description: Move to slot, apply dispense offset, wait, return to slot
gcode:
  SA_ASSERT_CAKE_ZERO
  MANUAL_STEPPER STEPPER=cake ENABLE=1
  {% set cake = params.CAKE|int %}
  {% set slot = params.SLOT|int %}
  {% set dwell = printer["gcode_macro SA_STATE"].dwell_ms|int %}

  {% if slot < 0 or slot > 5 %}
    { action_raise_error("SLOT must be 0..5") }
  {% endif %}

  {% if cake == 1 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake1_steps_per_60|int %}
    {% set offset = printer["gcode_macro SA_STATE"].cake1_dispense_offset|int %}
  {% elif cake == 2 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake2_steps_per_60|int %}
    {% set offset = printer["gcode_macro SA_STATE"].cake2_dispense_offset|int %}
  {% elif cake == 3 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake3_steps_per_60|int %}
    {% set offset = printer["gcode_macro SA_STATE"].cake3_dispense_offset|int %}
  {% elif cake == 4 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake4_steps_per_60|int %}
    {% set offset = printer["gcode_macro SA_STATE"].cake4_dispense_offset|int %}
  {% elif cake == 5 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake5_steps_per_60|int %}
    {% set offset = printer["gcode_macro SA_STATE"].cake5_dispense_offset|int %}
  {% elif cake == 6 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake6_steps_per_60|int %}
    {% set offset = printer["gcode_macro SA_STATE"].cake6_dispense_offset|int %}
  {% else %}
    { action_raise_error("CAKE must be 1..6") }
  {% endif %}

  {% set base = slot * pitch %}
  MANUAL_STEPPER STEPPER=cake MOVE={base} SPEED=12000 ACCEL=25000
  M400
  MANUAL_STEPPER STEPPER=cake MOVE={base + offset} SPEED=12000 ACCEL=25000
  M400
  G4 P{dwell}
  MANUAL_STEPPER STEPPER=cake MOVE={base} SPEED=12000 ACCEL=25000
  M400

  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=current_slot VALUE={slot}
  RESPOND PREFIX=SA MSG="DISPENSE_DONE_CAKE={cake}_SLOT={slot}"

[gcode_macro SA_RETURN_TOOL]
description: Move to slot, apply return offset opposite direction, wait, return to slot
gcode:
  SA_ASSERT_CAKE_ZERO
  MANUAL_STEPPER STEPPER=cake ENABLE=1
  {% set cake = params.CAKE|int %}
  {% set slot = params.SLOT|int %}
  {% set dwell = printer["gcode_macro SA_STATE"].dwell_ms|int %}

  {% if slot < 0 or slot > 5 %}
    { action_raise_error("SLOT must be 0..5") }
  {% endif %}

  {% if cake == 1 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake1_steps_per_60|int %}
    {% set offset = printer["gcode_macro SA_STATE"].cake1_return_offset|int %}
  {% elif cake == 2 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake2_steps_per_60|int %}
    {% set offset = printer["gcode_macro SA_STATE"].cake2_return_offset|int %}
  {% elif cake == 3 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake3_steps_per_60|int %}
    {% set offset = printer["gcode_macro SA_STATE"].cake3_return_offset|int %}
  {% elif cake == 4 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake4_steps_per_60|int %}
    {% set offset = printer["gcode_macro SA_STATE"].cake4_return_offset|int %}
  {% elif cake == 5 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake5_steps_per_60|int %}
    {% set offset = printer["gcode_macro SA_STATE"].cake5_return_offset|int %}
  {% elif cake == 6 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake6_steps_per_60|int %}
    {% set offset = printer["gcode_macro SA_STATE"].cake6_return_offset|int %}
  {% else %}
    { action_raise_error("CAKE must be 1..6") }
  {% endif %}

  {% set base = slot * pitch %}
  MANUAL_STEPPER STEPPER=cake MOVE={base} SPEED=12000 ACCEL=25000
  M400
  MANUAL_STEPPER STEPPER=cake MOVE={base - offset} SPEED=12000 ACCEL=25000
  M400
  G4 P{dwell}
  MANUAL_STEPPER STEPPER=cake MOVE={base} SPEED=12000 ACCEL=25000
  M400

  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=current_slot VALUE={slot}
  RESPOND PREFIX=SA MSG="RETURN_DONE_CAKE={cake}_SLOT={slot}"

[gcode_macro SA_INSPECT_FROM_CAKE]
description: Move to cake, present slot, then move gantry to camera pose
gcode:
  SA_ENABLE_ALL
  SA_ASSERT_HOMED
  SA_ASSERT_CAKE_ZERO
  {% set cake = params.CAKE|int %}
  {% set slot = params.SLOT|int %}

  {% if cake == 1 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake1_steps_per_60|int %}
    {% set offset = printer["gcode_macro SA_STATE"].cake1_dispense_offset|int %}
  {% elif cake == 2 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake2_steps_per_60|int %}
    {% set offset = printer["gcode_macro SA_STATE"].cake2_dispense_offset|int %}
  {% elif cake == 3 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake3_steps_per_60|int %}
    {% set offset = printer["gcode_macro SA_STATE"].cake3_dispense_offset|int %}
  {% elif cake == 4 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake4_steps_per_60|int %}
    {% set offset = printer["gcode_macro SA_STATE"].cake4_dispense_offset|int %}
  {% elif cake == 5 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake5_steps_per_60|int %}
    {% set offset = printer["gcode_macro SA_STATE"].cake5_dispense_offset|int %}
  {% elif cake == 6 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake6_steps_per_60|int %}
    {% set offset = printer["gcode_macro SA_STATE"].cake6_dispense_offset|int %}
  {% else %}
    { action_raise_error("CAKE must be 1..6") }
  {% endif %}

  {% set base = slot * pitch %}

  SA_MOVE_TO_CAKE CAKE={cake}
  MANUAL_STEPPER STEPPER=cake MOVE={base} SPEED=12000 ACCEL=25000
  M400
  MANUAL_STEPPER STEPPER=cake MOVE={base + offset} SPEED=12000 ACCEL=25000
  M400
  SA_MOVE_TO_CAMERA
  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=current_slot VALUE={slot}
  RESPOND PREFIX=SA MSG="INSPECT_READY_CAKE={cake}_SLOT={slot}"

# ============================================================
# FRONTEND-FRIENDLY HIGH-LEVEL CALLS
# These enable motion, do the job, park, disable motion
# ============================================================

[gcode_macro SA_DISPENSE_FROM_CAKE]
description: Full dispense sequence
gcode:
  {% set cake = params.CAKE|int %}
  {% set slot = params.SLOT|int %}
  SA_ENABLE_ALL
  SA_MOVE_TO_CAKE CAKE={cake}
  SA_DISPENSE CAKE={cake} SLOT={slot}
  SA_PARK
  SA_DISABLE_ALL

[gcode_macro SA_RETURN_TO_CAKE]
description: Full return sequence
gcode:
  {% set cake = params.CAKE|int %}
  {% set slot = params.SLOT|int %}
  SA_ENABLE_ALL
  SA_MOVE_TO_CAKE CAKE={cake}
  SA_RETURN_TOOL CAKE={cake} SLOT={slot}
  SA_PARK
  SA_DISABLE_ALL

# ============================================================
# TUNING MACROS
# ============================================================

[gcode_macro SA_SET_CAKE_STEPS_PER_60]
description: Usage SA_SET_CAKE_STEPS_PER_60 CAKE=1 STEPS=21333
gcode:
  {% set cake = params.CAKE|int %}
  {% set steps = params.STEPS|int %}

  {% if cake == 1 %}
    SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=cake1_steps_per_60 VALUE={steps}
  {% elif cake == 2 %}
    SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=cake2_steps_per_60 VALUE={steps}
  {% elif cake == 3 %}
    SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=cake3_steps_per_60 VALUE={steps}
  {% elif cake == 4 %}
    SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=cake4_steps_per_60 VALUE={steps}
  {% elif cake == 5 %}
    SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=cake5_steps_per_60 VALUE={steps}
  {% elif cake == 6 %}
    SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=cake6_steps_per_60 VALUE={steps}
  {% else %}
    { action_raise_error("CAKE must be 1..6") }
  {% endif %}

  RESPOND PREFIX=SA MSG="CAKE={cake} STEPS_PER_60={steps}"