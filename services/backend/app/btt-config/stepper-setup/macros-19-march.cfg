  {% elif cake == 3 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake3_steps_per_60|int %}
    {% set offset = printer["gcode_macro SA_STATE"].cake3_dispense_offset|int %}
  {% elif cake == 4 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake4_steps_per_60|int %}
    {% set offset = printer["gcode_macro SA_STATE"].cake4_dispense_offset|int %}
  {% elif cake == 5 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake5_steps_per_60|int %}
    {% set offset = printer["gcode_macro SA_STATE"].cake5_dispense_offset|int %}
  {% elif cake == 6 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake6_steps_per_60|int %}
    {% set offset = printer["gcode_macro SA_STATE"].cake6_dispense_offset|int %}
  {% else %}
    { action_raise_error("CAKE must be 1..6") }
  {% endif %}

  {% set base = slot * pitch %}

  SA_MOVE_TO_CAKE CAKE={cake}
  MANUAL_STEPPER STEPPER=cake MOVE={base} SPEED=12000 ACCEL=25000
  M400
  MANUAL_STEPPER STEPPER=cake MOVE={base + offset} SPEED=12000 ACCEL=25000
  M400
  SA_MOVE_TO_CAMERA
  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=current_slot VALUE={slot}
  RESPOND PREFIX=SA MSG="INSPECT_READY_CAKE={cake}_SLOT={slot}"


# ============================================================
# DOOR / HANDOFF FLOWS
# ============================================================

[gcode_macro SA_DISPENSE_TO_DOOR]
description: Move to cake, dispense, then present to user at LEFT door and wait for confirmation
gcode:
  {% set cake = params.CAKE|int %}
  {% set slot = params.SLOT|int %}
  SA_ENABLE_ALL
  SA_ASSERT_HOMED
  SA_MOVE_TO_CAKE CAKE={cake}
  SA_DISPENSE CAKE={cake} SLOT={slot}
  SA_MOVE_TO_DOOR
  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=pending_handoff VALUE=1
  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=pending_cake VALUE={cake}
  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=pending_slot VALUE={slot}
  RESPOND PREFIX=SA MSG="DISPENSE_AT_DOOR_WAITING_CONFIRM"

[gcode_macro SA_CONFIRM_USER_RECEIVED]
description: User confirmed receipt; choose where gantry goes next
gcode:
  {% if printer["gcode_macro SA_STATE"].pending_handoff|int != 1 %}
    { action_raise_error("No pending handoff.") }
  {% endif %}

  {% set mode = params.MODE|default("HOME")|string %}

  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=pending_handoff VALUE=0
  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=pending_cake VALUE=0
  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=pending_slot VALUE=0

  {% if mode == "DOOR" %}
    RESPOND PREFIX=SA MSG="USER_CONFIRMED_STAYING_AT_DOOR"
  {% elif mode == "LEFT" %}
    SA_MOVE_TO_LEFTMOST
    SA_DISABLE_ALL
    RESPOND PREFIX=SA MSG="USER_CONFIRMED_MOVED_LEFT"
  {% else %}
    SA_PARK
    SA_DISABLE_ALL
    RESPOND PREFIX=SA MSG="USER_CONFIRMED_PARKED_HOME"
  {% endif %}

[gcode_macro SA_START_RETURN_RECEIVE]
description: Move to LEFT door to receive a returned tool
gcode:
  SA_ENABLE_ALL
  SA_ASSERT_HOMED
  SA_MOVE_TO_DOOR
  RESPOND PREFIX=SA MSG="READY_TO_RECEIVE_RETURN_AT_DOOR"

[gcode_macro SA_RETURN_FROM_DOOR]
description: Return flow starts at LEFT door, then goes to cake, then back to door/home/left
gcode:
  {% set cake = params.CAKE|int %}
  {% set slot = params.SLOT|int %}
  {% set mode = params.MODE|default("DOOR")|string %}

  SA_ENABLE_ALL
  SA_ASSERT_HOMED
  SA_MOVE_TO_DOOR
  SA_MOVE_TO_CAKE CAKE={cake}
  SA_RETURN_TOOL CAKE={cake} SLOT={slot}

  {% if mode == "DOOR" %}
    SA_MOVE_TO_DOOR
    RESPOND PREFIX=SA MSG="RETURN_DONE_BACK_AT_DOOR"
  {% elif mode == "LEFT" %}
    SA_MOVE_TO_LEFTMOST
    SA_DISABLE_ALL
    RESPOND PREFIX=SA MSG="RETURN_DONE_MOVED_LEFT"
  {% else %}
    SA_PARK
    SA_DISABLE_ALL
    RESPOND PREFIX=SA MSG="RETURN_DONE_PARKED_HOME"
  {% endif %}


# ============================================================
# FRONTEND-FRIENDLY HIGH-LEVEL CALLS
# ============================================================

[gcode_macro SA_DISPENSE_FROM_CAKE]
description: Legacy dispense flow that ends at HOME
gcode:
  {% set cake = params.CAKE|int %}
  {% set slot = params.SLOT|int %}
  SA_ENABLE_ALL
  SA_MOVE_TO_CAKE CAKE={cake}
  SA_DISPENSE CAKE={cake} SLOT={slot}
  SA_PARK
  SA_DISABLE_ALL

[gcode_macro SA_RETURN_TO_CAKE]
description: Legacy return flow that ends at HOME
gcode:
  {% set cake = params.CAKE|int %}
  {% set slot = params.SLOT|int %}
  SA_ENABLE_ALL
  SA_MOVE_TO_CAKE CAKE={cake}
  SA_RETURN_TOOL CAKE={cake} SLOT={slot}
  SA_PARK
  SA_DISABLE_ALL


# ============================================================
# TUNING MACROS
# ============================================================

[gcode_macro SA_SET_CAKE_STEPS_PER_60]
description: Usage SA_SET_CAKE_STEPS_PER_60 CAKE=1 STEPS=21333
gcode:
  {% set cake = params.CAKE|int %}
  {% set steps = params.STEPS|int %}

  {% if cake == 1 %}
    SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=cake1_steps_per_60 VALUE={steps}
  {% elif cake == 2 %}
    SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=cake2_steps_per_60 VALUE={steps}
  {% elif cake == 3 %}
    SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=cake3_steps_per_60 VALUE={steps}
  {% elif cake == 4 %}
    SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=cake4_steps_per_60 VALUE={steps}
  {% elif cake == 5 %}
    SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=cake5_steps_per_60 VALUE={steps}
  {% elif cake == 6 %}
    SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=cake6_steps_per_60 VALUE={steps}
  {% else %}
    { action_raise_error("CAKE must be 1..6") }
  {% endif %}

  RESPOND PREFIX=SA MSG="CAKE={cake} STEPS_PER_60={steps}"
