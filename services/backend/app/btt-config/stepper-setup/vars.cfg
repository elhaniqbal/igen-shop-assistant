# ============================================================
# ShopAssistant Runtime Variables + Machine Geometry
# ============================================================

[gcode_macro SA_STATE]

# -----------------------------
# Machine state
# -----------------------------
variable_homed: 0
variable_x_pos: 0
variable_z_pos: 0
variable_current_slot: 0
variable_cake_zero_valid: 0

# -----------------------------
# Homing start positions
# -----------------------------
variable_vert_home_start: 50000
variable_horiz_home_start: 60000

# -----------------------------
# Named machine positions
# X = 0 at RIGHT endstop
# X increases moving LEFT
# Z = 0 at BOTTOM endstops
# Z increases moving UP
# -----------------------------
variable_cake_center_x: 49200

variable_cake1_z: 38800
variable_cake2_z: 47000
variable_cake3_z: 57000
variable_cake4_z: 90000
variable_cake5_z: 34000
variable_cake6_z: 55000

variable_camera_x: 30000
variable_camera_z: 12000

variable_park_x: 0
variable_park_z: 0

# -----------------------------
# Cake constants
# 60 deg ~= 21333 step-units
# Effective total reduction behaves like ~40:1
# Keep this as calibrated truth for now
# -----------------------------
variable_cake1_steps_per_60: 21333
variable_cake2_steps_per_60: 21333
variable_cake3_steps_per_60: 21333
variable_cake4_steps_per_60: 21333
variable_cake5_steps_per_60: 21333
variable_cake6_steps_per_60: 21333

variable_cake1_dispense_offset: 10666
variable_cake2_dispense_offset: 10666
variable_cake3_dispense_offset: 10666
variable_cake4_dispense_offset: 10666
variable_cake5_dispense_offset: 10666
variable_cake6_dispense_offset: 10666

variable_cake1_return_offset: 9000
variable_cake2_return_offset: 9000
variable_cake3_return_offset: 9000
variable_cake4_return_offset: 9000
variable_cake5_return_offset: 9000
variable_cake6_return_offset: 9000

variable_dwell_ms: 1500

# reserved for future encoder feedback
variable_last_encoder_angle: 0
variable_last_encoder_error: 0

gcode: