[gcode_macro SA_ROTATE_TO_SLOT]
description: rotate selected cake from current slot to target SLOT using shortest path
gcode:
  {% set cake = params.CAKE|int %}
  {% set slot = params.SLOT|int %}

  SA_ASSERT_CAKE_ZERO CAKE={cake}

  {% if slot < 0 or slot > 5 %}
    { action_raise_error("SLOT must be 0..5") }
  {% endif %}

  {% if cake == 1 %}
    {% set cur = printer["gcode_macro SA_STATE"].current_slot_cake1|int %}
  {% elif cake == 2 %}
    {% set cur = printer["gcode_macro SA_STATE"].current_slot_cake2|int %}
  {% elif cake == 3 %}
    {% set cur = printer["gcode_macro SA_STATE"].current_slot_cake3|int %}
  {% elif cake == 4 %}
    {% set cur = printer["gcode_macro SA_STATE"].current_slot_cake4|int %}
  {% elif cake == 5 %}
    {% set cur = printer["gcode_macro SA_STATE"].current_slot_cake5|int %}
  {% elif cake == 6 %}
    {% set cur = printer["gcode_macro SA_STATE"].current_slot_cake6|int %}
  {% else %}
    { action_raise_error("CAKE must be 1..6") }
  {% endif %}

  {% set cw = (slot - cur) % 6 %}
  {% set ccw = (cur - slot) % 6 %}

  {% if cw <= ccw %}
    {% for _ in range(cw) %}
      MOVE_CAKE_CW_60 CAKE={cake}
    {% endfor %}
  {% else %}
    {% for _ in range(ccw) %}
      MOVE_CAKE_CCW_60 CAKE={cake}
    {% endfor %}
  {% endif %}

  {% if cake == 1 %}
    SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=current_slot_cake1 VALUE={slot}
  {% elif cake == 2 %}
    SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=current_slot_cake2 VALUE={slot}
  {% elif cake == 3 %}
    SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=current_slot_cake3 VALUE={slot}
  {% elif cake == 4 %}
    SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=current_slot_cake4 VALUE={slot}
  {% elif cake == 5 %}
    SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=current_slot_cake5 VALUE={slot}
  {% elif cake == 6 %}
    SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=current_slot_cake6 VALUE={slot}
  {% endif %}

  RESPOND PREFIX=SA MSG="CAKE_AT_SLOT_CAKE={cake} SLOT={slot}"

[gcode_macro SA_ROTATE_TO_DISPENSE]
description: +60deg then temporary dispense offset pulse on selected cake
gcode:
  {% set cake = params.CAKE|int %}
  SA_ASSERT_CAKE_ZERO CAKE={cake}

  {% if cake == 1 %}
    {% set cur = printer["gcode_macro SA_STATE"].current_slot_cake1|int %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake1_steps_per_60|int %}
    {% set offset = printer["gcode_macro SA_STATE"].cake1_dispense_offset|int %}
    {% set stepper = "cake1" %}
  {% elif cake == 2 %}
    {% set cur = printer["gcode_macro SA_STATE"].current_slot_cake2|int %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake2_steps_per_60|int %}
    {% set offset = printer["gcode_macro SA_STATE"].cake2_dispense_offset|int %}
    {% set stepper = "cake2" %}
  {% elif cake == 3 %}
    {% set cur = printer["gcode_macro SA_STATE"].current_slot_cake3|int %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake3_steps_per_60|int %}
    {% set offset = printer["gcode_macro SA_STATE"].cake3_dispense_offset|int %}
    {% set stepper = "cake3" %}
  {% elif cake == 4 %}
    {% set cur = printer["gcode_macro SA_STATE"].current_slot_cake4|int %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake4_steps_per_60|int %}
    {% set offset = printer["gcode_macro SA_STATE"].cake4_dispense_offset|int %}
    {% set stepper = "cake4" %}
  {% elif cake == 5 %}
    {% set cur = printer["gcode_macro SA_STATE"].current_slot_cake5|int %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake5_steps_per_60|int %}
    {% set offset = printer["gcode_macro SA_STATE"].cake5_dispense_offset|int %}
    {% set stepper = "cake5" %}
  {% elif cake == 6 %}
    {% set cur = printer["gcode_macro SA_STATE"].current_slot_cake6|int %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake6_steps_per_60|int %}
    {% set offset = printer["gcode_macro SA_STATE"].cake6_dispense_offset|int %}
    {% set stepper = "cake6" %}
  {% else %}
    { action_raise_error("CAKE must be 1..6") }
  {% endif %}

  {% set next_slot = (cur + 1) % 6 %}
  {% set dispense_pos = pitch + offset %}

  MANUAL_STEPPER STEPPER={stepper} ENABLE=1
  MANUAL_STEPPER STEPPER={stepper} SET_POSITION=0
  MANUAL_STEPPER STEPPER={stepper} MOVE={dispense_pos} SPEED=12000 ACCEL=25000
  M400
  G4 P1
  MANUAL_STEPPER STEPPER={stepper} MOVE={pitch} SPEED=12000 ACCEL=25000
  M400
  MANUAL_STEPPER STEPPER={stepper} SET_POSITION=0

  {% if cake == 1 %}
    SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=current_slot_cake1 VALUE={next_slot}
  {% elif cake == 2 %}
    SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=current_slot_cake2 VALUE={next_slot}
  {% elif cake == 3 %}
    SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=current_slot_cake3 VALUE={next_slot}
  {% elif cake == 4 %}
    SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=current_slot_cake4 VALUE={next_slot}
  {% elif cake == 5 %}
    SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=current_slot_cake5 VALUE={next_slot}
  {% elif cake == 6 %}
    SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=current_slot_cake6 VALUE={next_slot}
  {% endif %}

  RESPOND PREFIX=SA MSG="CAKE_DISPENSED_CAKE={cake} SLOT={next_slot}"


[gcode_macro SA_ROTATE_TO_RETURN]
description: reverse temporary return offset pulse on selected cake
gcode:
  {% set cake = params.CAKE|int %}
  SA_ASSERT_CAKE_ZERO CAKE={cake}

  {% if cake == 1 %}
    {% set offset = printer["gcode_macro SA_STATE"].cake1_return_offset|int %}
    {% set stepper = "cake1" %}
  {% elif cake == 2 %}
    {% set offset = printer["gcode_macro SA_STATE"].cake2_return_offset|int %}
    {% set stepper = "cake2" %}
  {% elif cake == 3 %}
    {% set offset = printer["gcode_macro SA_STATE"].cake3_return_offset|int %}
    {% set stepper = "cake3" %}
  {% elif cake == 4 %}
    {% set offset = printer["gcode_macro SA_STATE"].cake4_return_offset|int %}
    {% set stepper = "cake4" %}
  {% elif cake == 5 %}
    {% set offset = printer["gcode_macro SA_STATE"].cake5_return_offset|int %}
    {% set stepper = "cake5" %}
  {% elif cake == 6 %}
    {% set offset = printer["gcode_macro SA_STATE"].cake6_return_offset|int %}
    {% set stepper = "cake6" %}
  {% else %}
    { action_raise_error("CAKE must be 1..6") }
  {% endif %}

  {% set reverse_offset = 0 - offset %}

  MANUAL_STEPPER STEPPER={stepper} ENABLE=1
  MANUAL_STEPPER STEPPER={stepper} SET_POSITION=0
  MANUAL_STEPPER STEPPER={stepper} MOVE={reverse_offset} SPEED=12000 ACCEL=25000
  M400
  G4 P1
  MANUAL_STEPPER STEPPER={stepper} MOVE=0 SPEED=12000 ACCEL=25000
  M400
  MANUAL_STEPPER STEPPER={stepper} SET_POSITION=0

  RESPOND PREFIX=SA MSG="CAKE_RETURN_PULSE_CAKE={cake}"

