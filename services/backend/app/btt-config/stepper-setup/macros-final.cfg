# ============================================================
# Shop Assistant bridge2 dumb-motion macros
# Configured to use SA_STATE from vars.cfg
#
# Design intent:
# - vars.cfg owns machine geometry + runtime state
# - app/backend owns slot logic / workflow logic
# - cake moves stay dumb primitives
# - no hidden full dispense/return sequence in Klipper
# ============================================================

[gcode_macro SA_ENABLE_ALL]
gcode:
  MANUAL_STEPPER STEPPER=gantry1 ENABLE=1
  MANUAL_STEPPER STEPPER=gantry2 ENABLE=1
  MANUAL_STEPPER STEPPER=horiz ENABLE=1
  MANUAL_STEPPER STEPPER=cake ENABLE=1

[gcode_macro SA_DISABLE_ALL]
gcode:
  MANUAL_STEPPER STEPPER=gantry1 ENABLE=0
  MANUAL_STEPPER STEPPER=gantry2 ENABLE=0
  MANUAL_STEPPER STEPPER=horiz ENABLE=0
  MANUAL_STEPPER STEPPER=cake ENABLE=0

[gcode_macro SA_ASSERT_HOMED]
gcode:
  {% if printer["gcode_macro SA_STATE"].homed|int != 1 %}
    { action_raise_error("Machine not homed. Run SA_HOME_MACHINE first.") }
  {% endif %}

[gcode_macro SA_ASSERT_CAKE_ZERO]
gcode:
  {% set cake = params.CAKE|int %}

  {% if cake == 1 %}
    {% set valid = printer["gcode_macro SA_STATE"].cake_zero_valid_cake1|int %}
  {% elif cake == 2 %}
    {% set valid = printer["gcode_macro SA_STATE"].cake_zero_valid_cake2|int %}
  {% elif cake == 3 %}
    {% set valid = printer["gcode_macro SA_STATE"].cake_zero_valid_cake3|int %}
  {% elif cake == 4 %}
    {% set valid = printer["gcode_macro SA_STATE"].cake_zero_valid_cake4|int %}
  {% elif cake == 5 %}
    {% set valid = printer["gcode_macro SA_STATE"].cake_zero_valid_cake5|int %}
  {% elif cake == 6 %}
    {% set valid = printer["gcode_macro SA_STATE"].cake_zero_valid_cake6|int %}
  {% else %}
    { action_raise_error("CAKE must be 1..6") }
  {% endif %}

  {% if valid != 1 %}
    { action_raise_error("Cake logical zero not set for selected cake. Align slot 0 and run SA_CAKE_SET_ZERO CAKE=<n>.") }
  {% endif %}

[gcode_macro SA_STATUS]
description: frontend-friendly machine status
gcode:
  RESPOND PREFIX=SA MSG="homed={printer['gcode_macro SA_STATE'].homed} x={printer['gcode_macro SA_STATE'].x_pos} z={printer['gcode_macro SA_STATE'].z_pos} slot1={printer['gcode_macro SA_STATE'].current_slot_cake1} slot2={printer['gcode_macro SA_STATE'].current_slot_cake2} slot3={printer['gcode_macro SA_STATE'].current_slot_cake3} slot4={printer['gcode_macro SA_STATE'].current_slot_cake4} slot5={printer['gcode_macro SA_STATE'].current_slot_cake5} slot6={printer['gcode_macro SA_STATE'].current_slot_cake6} zero1={printer['gcode_macro SA_STATE'].cake_zero_valid_cake1} zero2={printer['gcode_macro SA_STATE'].cake_zero_valid_cake2} zero3={printer['gcode_macro SA_STATE'].cake_zero_valid_cake3} zero4={printer['gcode_macro SA_STATE'].cake_zero_valid_cake4} zero5={printer['gcode_macro SA_STATE'].cake_zero_valid_cake5} zero6={printer['gcode_macro SA_STATE'].cake_zero_valid_cake6}"
  
[gcode_macro SA_SET_VERTICAL_HOME]
description: declare vertical already at home without moving
gcode:
  MANUAL_STEPPER STEPPER=gantry1 ENABLE=1
  MANUAL_STEPPER STEPPER=gantry2 ENABLE=1
  MANUAL_STEPPER STEPPER=gantry1 SET_POSITION=0
  MANUAL_STEPPER STEPPER=gantry2 SET_POSITION=0
  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=z_pos VALUE=0
  RESPOND PREFIX=SA MSG="VERTICAL_HOME_SET_NO_MOVE"

[gcode_macro SA_SET_HORIZONTAL_HOME]
description: declare horizontal already at home without moving
gcode:
  MANUAL_STEPPER STEPPER=horiz ENABLE=1
  MANUAL_STEPPER STEPPER=horiz SET_POSITION=0
  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=x_pos VALUE=0
  RESPOND PREFIX=SA MSG="HORIZONTAL_HOME_SET_NO_MOVE"

[gcode_macro SA_HOME_VERTICAL_SYNC]
description: synced vertical home to Z0
gcode:
  {% if printer["gcode_macro SA_STATE"].homed|int == 1 %}
    {% set start = printer["gcode_macro SA_STATE"].z_pos|int %}
  {% else %}
    {% set start = printer["gcode_macro SA_STATE"].vert_home_start|int %}
  {% endif %}

  MANUAL_STEPPER STEPPER=gantry1 ENABLE=1
  MANUAL_STEPPER STEPPER=gantry2 ENABLE=1
  MANUAL_STEPPER STEPPER=gantry1 SET_POSITION={start}
  MANUAL_STEPPER STEPPER=gantry2 SET_POSITION={start}
  MANUAL_STEPPER STEPPER=gantry1 MOVE=0 SPEED=8000 ACCEL=15000 SYNC=0
  MANUAL_STEPPER STEPPER=gantry2 MOVE=0 SPEED=8000 ACCEL=15000
  M400
  MANUAL_STEPPER STEPPER=gantry1 SET_POSITION=0
  MANUAL_STEPPER STEPPER=gantry2 SET_POSITION=0
  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=z_pos VALUE=0
  RESPOND PREFIX=SA MSG="VERTICAL_SYNC_HOME_DONE"

[gcode_macro SA_HOME_HORIZONTAL]
description: home horizontal gantry to right endstop
gcode:
  {% set start = printer["gcode_macro SA_STATE"].horiz_home_start|int %}
  MANUAL_STEPPER STEPPER=horiz ENABLE=1
  MANUAL_STEPPER STEPPER=horiz SET_POSITION={start}
  MANUAL_STEPPER STEPPER=horiz MOVE=0 SPEED=12000 ACCEL=30000 STOP_ON_ENDSTOP=1
  M400
  MANUAL_STEPPER STEPPER=horiz SET_POSITION=0
  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=x_pos VALUE=0
  RESPOND PREFIX=SA MSG="HORIZONTAL_HOMED"

[gcode_macro SA_HOME_MACHINE]
description: default machine home sequence
gcode:
  SA_ENABLE_ALL
  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=homed VALUE=0
  # SA_HOME_VERTICAL_SYNC
  SA_HOME_HORIZONTAL
  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=homed VALUE=1
  RESPOND PREFIX=SA MSG="MACHINE_HOMED"

[gcode_macro SA_X_MOVE_ABS]
description: move horizontal gantry to absolute X
gcode:
#  SA_ASSERT_HOMED
  MANUAL_STEPPER STEPPER=horiz ENABLE=1
  {% set pos = params.POS|int %}
  MANUAL_STEPPER STEPPER=horiz MOVE={pos} SPEED=15000 ACCEL=30000
  M400
  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=x_pos VALUE={pos}
  RESPOND PREFIX=SA MSG="X_AT={pos}"

[gcode_macro SA_Z_MOVE_ABS]
description: move vertical gantry to absolute Z with both motors synced
gcode:
 # SA_ASSERT_HOMED
  MANUAL_STEPPER STEPPER=gantry1 ENABLE=1
  MANUAL_STEPPER STEPPER=gantry2 ENABLE=1
  {% set pos = params.POS|int %}
  MANUAL_STEPPER STEPPER=gantry1 MOVE={pos} SPEED=12000 ACCEL=30000 SYNC=0
  MANUAL_STEPPER STEPPER=gantry2 MOVE={pos} SPEED=12000 ACCEL=30000
  M400
  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=z_pos VALUE={pos}
  RESPOND PREFIX=SA MSG="Z_AT={pos}"

[gcode_macro SA_MOVE_TO_CAKE]
description: move gantry to cake 1..6
gcode:
  SA_ASSERT_HOMED
  {% set cake = params.CAKE|int %}
  {% set center_x = printer["gcode_macro SA_STATE"].cake_center_x|int %}

  {% if cake == 1 %}
    {% set z = printer["gcode_macro SA_STATE"].cake1_z|int %}
  {% elif cake == 2 %}
    {% set z = printer["gcode_macro SA_STATE"].cake2_z|int %}
  {% elif cake == 3 %}
    {% set z = printer["gcode_macro SA_STATE"].cake3_z|int %}
  {% elif cake == 4 %}
    {% set z = printer["gcode_macro SA_STATE"].cake4_z|int %}
  {% elif cake == 5 %}
    {% set z = printer["gcode_macro SA_STATE"].cake5_z|int %}
  {% elif cake == 6 %}
    {% set z = printer["gcode_macro SA_STATE"].cake6_z|int %}
  {% else %}
    { action_raise_error("CAKE must be 1..6") }
  {% endif %}

  SA_X_MOVE_ABS POS={center_x}
  SA_Z_MOVE_ABS POS={z}
  RESPOND PREFIX=SA MSG="AT_CAKE={cake}"

[gcode_macro SA_MOVE_TO_DOOR]
description: move gantry to door pose
gcode:
  SA_ASSERT_HOMED
  {% set x = printer["gcode_macro SA_STATE"].door_x|int %}
  {% set z = printer["gcode_macro SA_STATE"].door_z|int %}
  {% set safe_z = printer["gcode_macro SA_STATE"].travel_z|int %}
  SA_Z_MOVE_ABS POS={safe_z}
  SA_X_MOVE_ABS POS={x}
  SA_Z_MOVE_ABS POS={z}
  RESPOND PREFIX=SA MSG="AT_DOOR"

[gcode_macro SA_MOVE_TO_CAMERA]
description: move gantry to camera pose
gcode:
  SA_ASSERT_HOMED
  {% set x = printer["gcode_macro SA_STATE"].camera_x|int %}
  {% set z = printer["gcode_macro SA_STATE"].camera_z|int %}
  {% set safe_z = printer["gcode_macro SA_STATE"].travel_z|int %}
  SA_Z_MOVE_ABS POS={safe_z}
  SA_X_MOVE_ABS POS={x}
  SA_Z_MOVE_ABS POS={z}
  RESPOND PREFIX=SA MSG="AT_CAMERA"

[gcode_macro SA_PARK]
description: move gantry to park pose
gcode:
  SA_ASSERT_HOMED
  {% set x = printer["gcode_macro SA_STATE"].park_x|int %}
  {% set z = printer["gcode_macro SA_STATE"].park_z|int %}
  {% set safe_z = printer["gcode_macro SA_STATE"].travel_z|int %}
  SA_Z_MOVE_ABS POS={safe_z}
  SA_X_MOVE_ABS POS={x}
  SA_Z_MOVE_ABS POS={z}
  RESPOND PREFIX=SA MSG="PARKED"

[gcode_macro SA_JOG_GANTRY_UP]
description: positive relative synced Z jog
gcode:
  SA_ASSERT_HOMED
  {% set dist = params.DIST|int %}
  {% set cur = printer["gcode_macro SA_STATE"].z_pos|int %}
  {% set new = cur + dist %}
  SA_Z_MOVE_ABS POS={new}

[gcode_macro SA_JOG_GANTRY_DOWN]
description: negative relative synced Z jog
gcode:
  SA_ASSERT_HOMED
  {% set dist = params.DIST|int %}
  {% set cur = printer["gcode_macro SA_STATE"].z_pos|int %}
  {% set new = cur - dist %}
  SA_Z_MOVE_ABS POS={new}

[gcode_macro SA_JOG_HORIZ_LEFT]
description: positive relative X jog
gcode:
  SA_ASSERT_HOMED
  {% set dist = params.DIST|int %}
  {% set cur = printer["gcode_macro SA_STATE"].x_pos|int %}
  {% set new = cur + dist %}
  SA_X_MOVE_ABS POS={new}

[gcode_macro SA_JOG_HORIZ_RIGHT]
description: negative relative X jog
gcode:
  SA_ASSERT_HOMED
  {% set dist = params.DIST|int %}
  {% set cur = printer["gcode_macro SA_STATE"].x_pos|int %}
  {% set new = cur - dist %}
  SA_X_MOVE_ABS POS={new}


[gcode_macro SA_CAKE_SET_ZERO]
description: zero selected cake motor logical position and reset per-cake slot state
gcode:
  {% set cake = params.CAKE|int %}

  {% if cake == 1 %}
    MANUAL_STEPPER STEPPER=cake1 ENABLE=1
    MANUAL_STEPPER STEPPER=cake1 SET_POSITION=0
    SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=current_slot_cake1 VALUE=0
    SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=cake_zero_valid_cake1 VALUE=1
  {% elif cake == 2 %}
    MANUAL_STEPPER STEPPER=cake2 ENABLE=1
    MANUAL_STEPPER STEPPER=cake2 SET_POSITION=0
    SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=current_slot_cake2 VALUE=0
    SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=cake_zero_valid_cake2 VALUE=1
  {% elif cake == 3 %}
    MANUAL_STEPPER STEPPER=cake3 ENABLE=1
    MANUAL_STEPPER STEPPER=cake3 SET_POSITION=0
    SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=current_slot_cake3 VALUE=0
    SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=cake_zero_valid_cake3 VALUE=1
  {% elif cake == 4 %}
    MANUAL_STEPPER STEPPER=cake4 ENABLE=1
    MANUAL_STEPPER STEPPER=cake4 SET_POSITION=0
    SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=current_slot_cake4 VALUE=0
    SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=cake_zero_valid_cake4 VALUE=1
  {% elif cake == 5 %}
    MANUAL_STEPPER STEPPER=cake5 ENABLE=1
    MANUAL_STEPPER STEPPER=cake5 SET_POSITION=0
    SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=current_slot_cake5 VALUE=0
    SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=cake_zero_valid_cake5 VALUE=1
  {% elif cake == 6 %}
    MANUAL_STEPPER STEPPER=cake6 ENABLE=1
    MANUAL_STEPPER STEPPER=cake6 SET_POSITION=0
    SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=current_slot_cake6 VALUE=0
    SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=cake_zero_valid_cake6 VALUE=1
  {% else %}
    { action_raise_error("CAKE must be 1..6") }
  {% endif %}

  RESPOND PREFIX=SA MSG="CAKE_ZERO_SET_CAKE={cake}"

