# ============================================================
# Shop Assistant bridge2 dumb-motion macros
# File name: macros-bridge2-dumb.cfg
#
# Design intent:
# - Klipper stores only machine pose + homed truth + persistent geometry
# - App/backend owns cake slot state / workflow state
# - Cake moves are dumb 60-degree primitives only
# - No hidden dispense / return sequences inside macros
# ============================================================

[gcode_macro SA_ENABLE_ALL]
gcode:
  MANUAL_STEPPER STEPPER=gantry1 ENABLE=1
  MANUAL_STEPPER STEPPER=gantry2 ENABLE=1
  MANUAL_STEPPER STEPPER=horiz ENABLE=1
  MANUAL_STEPPER STEPPER=cake ENABLE=1

[gcode_macro SA_DISABLE_ALL]
gcode:
  MANUAL_STEPPER STEPPER=gantry1 ENABLE=0
  MANUAL_STEPPER STEPPER=gantry2 ENABLE=0
  MANUAL_STEPPER STEPPER=horiz ENABLE=0
  MANUAL_STEPPER STEPPER=cake ENABLE=0

[gcode_macro SA_ASSERT_HOMED]
gcode:
  {% if printer["gcode_macro SA_STATE"].homed|int != 1 %}
    { action_raise_error("Machine not homed. Run SA_HOME_MACHINE first.") }
  {% endif %}

[gcode_macro SA_STATUS]
description: frontend-friendly machine status
# Keep this tiny and deterministic for Moonraker polling / logs
gcode:
  RESPOND PREFIX=SA MSG="homed={printer['gcode_macro SA_STATE'].homed} x={printer['gcode_macro SA_STATE'].x_pos} z={printer['gcode_macro SA_STATE'].z_pos}"

[gcode_macro SA_SET_VERTICAL_HOME]
description: declare vertical already at home without moving
gcode:
  MANUAL_STEPPER STEPPER=gantry1 ENABLE=1
  MANUAL_STEPPER STEPPER=gantry2 ENABLE=1
  MANUAL_STEPPER STEPPER=gantry1 SET_POSITION=0
  MANUAL_STEPPER STEPPER=gantry2 SET_POSITION=0
  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=z_pos VALUE=0
  RESPOND PREFIX=SA MSG="VERTICAL_HOME_SET_NO_MOVE"

[gcode_macro SA_SET_HORIZONTAL_HOME]
description: declare horizontal already at home without moving
gcode:
  MANUAL_STEPPER STEPPER=horiz ENABLE=1
  MANUAL_STEPPER STEPPER=horiz SET_POSITION=0
  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=x_pos VALUE=0
  RESPOND PREFIX=SA MSG="HORIZONTAL_HOME_SET_NO_MOVE"

[gcode_macro SA_HOME_VERTICAL_SYNC]
description: synced vertical home to Z0
gcode:
  {% if printer["gcode_macro SA_STATE"].homed|int == 1 %}
    {% set start = printer["gcode_macro SA_STATE"].z_pos|int %}
  {% else %}
    {% set start = printer["gcode_macro SA_STATE"].vert_home_start|int %}
  {% endif %}

  MANUAL_STEPPER STEPPER=gantry1 ENABLE=1
  MANUAL_STEPPER STEPPER=gantry2 ENABLE=1
  MANUAL_STEPPER STEPPER=gantry1 SET_POSITION={start}
  MANUAL_STEPPER STEPPER=gantry2 SET_POSITION={start}
  MANUAL_STEPPER STEPPER=gantry1 MOVE=0 SPEED=8000 ACCEL=15000 SYNC=0
  MANUAL_STEPPER STEPPER=gantry2 MOVE=0 SPEED=8000 ACCEL=15000
  M400
  MANUAL_STEPPER STEPPER=gantry1 SET_POSITION=0
  MANUAL_STEPPER STEPPER=gantry2 SET_POSITION=0
  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=z_pos VALUE=0
  RESPOND PREFIX=SA MSG="VERTICAL_SYNC_HOME_DONE"

[gcode_macro SA_HOME_HORIZONTAL]
description: home horizontal gantry to right endstop
gcode:
  MANUAL_STEPPER STEPPER=horiz ENABLE=1
  MANUAL_STEPPER STEPPER=horiz SET_POSITION=160000
  MANUAL_STEPPER STEPPER=horiz MOVE=0 SPEED=12000 ACCEL=30000 STOP_ON_ENDSTOP=1
  M400
  MANUAL_STEPPER STEPPER=horiz SET_POSITION=0
  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=x_pos VALUE=0
  RESPOND PREFIX=SA MSG="HORIZONTAL_HOMED"

[gcode_macro SA_HOME_MACHINE]
description: default machine home sequence
gcode:
  SA_ENABLE_ALL
  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=homed VALUE=0
  SA_HOME_VERTICAL_SYNC
  SA_HOME_HORIZONTAL
  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=homed VALUE=1
  RESPOND PREFIX=SA MSG="MACHINE_HOMED"

[gcode_macro SA_X_MOVE_ABS]
description: move horizontal gantry to absolute X
gcode:
  SA_ASSERT_HOMED
  MANUAL_STEPPER STEPPER=horiz ENABLE=1
  {% set pos = params.POS|int %}
  MANUAL_STEPPER STEPPER=horiz MOVE={pos} SPEED=15000 ACCEL=30000
  M400
  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=x_pos VALUE={pos}
  RESPOND PREFIX=SA MSG="X_AT={pos}"

[gcode_macro SA_Z_MOVE_ABS]
description: move vertical gantry to absolute Z with both motors synced
gcode:
  SA_ASSERT_HOMED
  MANUAL_STEPPER STEPPER=gantry1 ENABLE=1
  MANUAL_STEPPER STEPPER=gantry2 ENABLE=1
  {% set pos = params.POS|int %}
  MANUAL_STEPPER STEPPER=gantry1 MOVE={pos} SPEED=12000 ACCEL=30000 SYNC=0
  MANUAL_STEPPER STEPPER=gantry2 MOVE={pos} SPEED=12000 ACCEL=30000
  M400
  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=z_pos VALUE={pos}
  RESPOND PREFIX=SA MSG="Z_AT={pos}"

[gcode_macro SA_MOVE_TO_CAKE]
description: move gantry to cake 1..6
gcode:
  SA_ASSERT_HOMED
  {% set cake = params.CAKE|int %}
  {% set center_x = printer["gcode_macro SA_STATE"].cake_center_x|int %}

  {% if cake == 1 %}
    {% set z = printer["gcode_macro SA_STATE"].cake1_z|int %}
  {% elif cake == 2 %}
    {% set z = printer["gcode_macro SA_STATE"].cake2_z|int %}
  {% elif cake == 3 %}
    {% set z = printer["gcode_macro SA_STATE"].cake3_z|int %}
  {% elif cake == 4 %}
    {% set z = printer["gcode_macro SA_STATE"].cake4_z|int %}
  {% elif cake == 5 %}
    {% set z = printer["gcode_macro SA_STATE"].cake5_z|int %}
  {% elif cake == 6 %}
    {% set z = printer["gcode_macro SA_STATE"].cake6_z|int %}
  {% else %}
    { action_raise_error("CAKE must be 1..6") }
  {% endif %}

  SA_X_MOVE_ABS POS={center_x}
  SA_Z_MOVE_ABS POS={z}
  RESPOND PREFIX=SA MSG="AT_CAKE={cake}"

[gcode_macro SA_MOVE_TO_DOOR]
description: move gantry to door pose
gcode:
  SA_ASSERT_HOMED
  {% set x = printer["gcode_macro SA_STATE"].door_x|int %}
  {% set z = printer["gcode_macro SA_STATE"].door_z|int %}
  {% set safe_z = printer["gcode_macro SA_STATE"].travel_z|int %}
  SA_Z_MOVE_ABS POS={safe_z}
  SA_X_MOVE_ABS POS={x}
  SA_Z_MOVE_ABS POS={z}
  RESPOND PREFIX=SA MSG="AT_DOOR"

[gcode_macro SA_PARK]
description: move gantry to park pose
gcode:
  SA_ASSERT_HOMED
  {% set x = printer["gcode_macro SA_STATE"].park_x|int %}
  {% set z = printer["gcode_macro SA_STATE"].park_z|int %}
  {% set safe_z = printer["gcode_macro SA_STATE"].travel_z|int %}
  SA_Z_MOVE_ABS POS={safe_z}
  SA_X_MOVE_ABS POS={x}
  SA_Z_MOVE_ABS POS={z}
  RESPOND PREFIX=SA MSG="PARKED"

[gcode_macro SA_JOG_GANTRY_UP]
description: positive relative synced Z jog
gcode:
  SA_ASSERT_HOMED
  {% set dist = params.DIST|int %}
  {% set cur = printer["gcode_macro SA_STATE"].z_pos|int %}
  {% set new = cur + dist %}
  SA_Z_MOVE_ABS POS={new}

[gcode_macro SA_JOG_GANTRY_DOWN]
description: negative relative synced Z jog
gcode:
  SA_ASSERT_HOMED
  {% set dist = params.DIST|int %}
  {% set cur = printer["gcode_macro SA_STATE"].z_pos|int %}
  {% set new = cur - dist %}
  SA_Z_MOVE_ABS POS={new}

[gcode_macro SA_JOG_HORIZ_LEFT]
description: positive relative X jog
gcode:
  SA_ASSERT_HOMED
  {% set dist = params.DIST|int %}
  {% set cur = printer["gcode_macro SA_STATE"].x_pos|int %}
  {% set new = cur + dist %}
  SA_X_MOVE_ABS POS={new}

[gcode_macro SA_JOG_HORIZ_RIGHT]
description: negative relative X jog
gcode:
  SA_ASSERT_HOMED
  {% set dist = params.DIST|int %}
  {% set cur = printer["gcode_macro SA_STATE"].x_pos|int %}
  {% set new = cur - dist %}
  SA_X_MOVE_ABS POS={new}

[gcode_macro SA_CAKE_SET_ZERO]
description: zero cake motor logical position only; app owns slot state
gcode:
  MANUAL_STEPPER STEPPER=cake ENABLE=1
  MANUAL_STEPPER STEPPER=cake SET_POSITION=0
  RESPOND PREFIX=SA MSG="CAKE_ZERO_SET"

[gcode_macro MOVE_CAKE_CW_60]
description: dumb +60deg primitive; app owns resulting slot state
gcode:
  MANUAL_STEPPER STEPPER=cake ENABLE=1
  {% set cake = params.CAKE|int %}
  {% if cake == 1 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake1_steps_per_60|int %}
  {% elif cake == 2 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake2_steps_per_60|int %}
  {% elif cake == 3 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake3_steps_per_60|int %}
  {% elif cake == 4 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake4_steps_per_60|int %}
  {% elif cake == 5 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake5_steps_per_60|int %}
  {% elif cake == 6 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake6_steps_per_60|int %}
  {% else %}
    { action_raise_error("CAKE must be 1..6") }
  {% endif %}
  MANUAL_STEPPER STEPPER=cake SET_POSITION=0
  MANUAL_STEPPER STEPPER=cake MOVE={pitch} SPEED=12000 ACCEL=25000
  M400
  MANUAL_STEPPER STEPPER=cake SET_POSITION=0
  RESPOND PREFIX=SA MSG="CAKE_CW_60_CAKE={cake}"

[gcode_macro MOVE_CAKE_CCW_60]
description: dumb -60deg primitive; app owns resulting slot state
gcode:
  MANUAL_STEPPER STEPPER=cake ENABLE=1
  {% set cake = params.CAKE|int %}
  {% if cake == 1 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake1_steps_per_60|int %}
  {% elif cake == 2 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake2_steps_per_60|int %}
  {% elif cake == 3 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake3_steps_per_60|int %}
  {% elif cake == 4 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake4_steps_per_60|int %}
  {% elif cake == 5 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake5_steps_per_60|int %}
  {% elif cake == 6 %}
    {% set pitch = printer["gcode_macro SA_STATE"].cake6_steps_per_60|int %}
  {% else %}
    { action_raise_error("CAKE must be 1..6") }
  {% endif %}
  MANUAL_STEPPER STEPPER=cake SET_POSITION=0
  MANUAL_STEPPER STEPPER=cake MOVE=-{pitch} SPEED=12000 ACCEL=25000
  M400
  MANUAL_STEPPER STEPPER=cake SET_POSITION=0
  RESPOND PREFIX=SA MSG="CAKE_CCW_60_CAKE={cake}"

[gcode_macro SA_SET_DOOR_X]
description: persist door_x
gcode:
  {% set value = params.VALUE|int %}
  SAVE_VARIABLE VARIABLE=door_x VALUE={value}
  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=door_x VALUE={value}
  RESPOND PREFIX=SA MSG="DOOR_X_SET={value}"

[gcode_macro SA_SET_DOOR_Z]
description: persist door_z
gcode:
  {% set value = params.VALUE|int %}
  SAVE_VARIABLE VARIABLE=door_z VALUE={value}
  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=door_z VALUE={value}
  RESPOND PREFIX=SA MSG="DOOR_Z_SET={value}"

[gcode_macro SA_SET_CAKE_CENTER_X]
description: persist cake center x
gcode:
  {% set value = params.VALUE|int %}
  SAVE_VARIABLE VARIABLE=cake_center_x VALUE={value}
  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=cake_center_x VALUE={value}
  RESPOND PREFIX=SA MSG="CAKE_CENTER_X_SET={value}"
