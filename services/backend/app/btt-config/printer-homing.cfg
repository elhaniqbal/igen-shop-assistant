# ============================================================
# Octopus Max EZ - ShopAssistant TEST RIG (v3 SENSORLESS)
# SENSORLESS HOMING (StallGuard) for X and Z
#
# REQUIREMENTS:
# - TMC2209 DIAG pins wired to MCU inputs
# - diag_pin fields below MUST be set correctly
#
# WARNING:
# - Sensorless homing on dual Z can rack gantry if not tuned.
# - Use low homing speed/accel.
# ============================================================

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_07002F001351313531383332-if00
restart_method: command

[printer]
kinematics: none
max_velocity: 30000
max_accel: 10000

# =========================
# X axis (was manual_stepper horiz)
# =========================
[stepper_x]
step_pin: PB8
dir_pin: !PB9
enable_pin: !PB7
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 3200
position_min: 0
position_max: 999999  # set later when you know real travel
homing_speed: 2000
homing_retract_dist: 0
# Sensorless "virtual endstop"
endstop_pin: tmc2209_stepper_x:virtual_endstop

[tmc2209 stepper_x]
uart_pin: PG11
run_current: 0.90
hold_current: 0.50
stealthchop_threshold: 0
# YOU MUST SET THIS to the MCU pin wired to DIAG for the X driver
diag_pin: ^PF3
driver_SGTHRS: 90

# =========================
# Z axis (dual motor gantry)
# =========================
[stepper_z]
step_pin: PC13
dir_pin: !PC14
enable_pin: !PE6
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 3200
position_min: 0
position_max: 999999
homing_speed: 800
homing_retract_dist: 0
endstop_pin: tmc2209_stepper_z:virtual_endstop

[tmc2209 stepper_z]
uart_pin: PG14
run_current: 0.90
hold_current: 0.50
stealthchop_threshold: 0
diag_pin: ^PF0
driver_SGTHRS: 95

[stepper_z1]
step_pin: PE4
dir_pin: !PE5
enable_pin: !PE3
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 3200

[tmc2209 stepper_z1]
uart_pin: PG13
run_current: 0.90
hold_current: 0.50
stealthchop_threshold: 0
# Optional: you can set diag_pin here too, but Klipper homes Z using stepper_z endstop.
# diag_pin: ^<PUT_REAL_MCU_PIN_HERE>
# driver_SGTHRS: 95

# =========================
# Cake stays manual_stepper (same as before)
# =========================
[manual_stepper cake1]
step_pin: PE1
dir_pin: PE0
enable_pin: !PE2
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 3200
velocity: 15000
accel: 30000

[tmc2209 manual_stepper cake1]
uart_pin: PG12
run_current: 0.90
hold_current: 0.50
stealthchop_threshold: 0

# =========================
# Config + State
# =========================
[gcode_macro SA_CFG]
variable_z_cake1: 35000
variable_z_cake2: 0
variable_z_cake3: 0
variable_z_cake4: 0
variable_z_cake5: 0
variable_z_cake6: 0

variable_x_center: 48000
variable_x_center_to_right: -48000

variable_cake1_slot: 21333
variable_cake2_slot: 21333
variable_cake3_slot: 21333
variable_cake4_slot: 21333
variable_cake5_slot: 21333
variable_cake6_slot: 21333

gcode:
  ; storage only

[gcode_macro SA_STATE]
variable_is_homed: 0
gcode:
  ; storage only

[gcode_macro SA_REQUIRE_HOMED]
gcode:
  {% if printer["gcode_macro SA_STATE"].is_homed|int != 1 %}
    {action_raise_error("NOT_HOMED: run SA_HOME first")}
  {% endif %}

# =========================
# Homing + API macros
# =========================

[gcode_macro SA_INIT]
gcode:
  RESPOND PREFIX=SA MSG="INIT_OK HOMED={printer['gcode_macro SA_STATE'].is_homed}"

[gcode_macro SA_HOME]
description: Sensorless home X and Z (requires DIAG wiring + tuned SGTHRS)
gcode:
  G90
  G28 X
  G28 Z
  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=is_homed VALUE=1
  RESPOND PREFIX=SA MSG="HOME_DONE HOMED=1"

[gcode_macro SA_UNHOME]
gcode:
  SET_GCODE_VARIABLE MACRO=SA_STATE VARIABLE=is_homed VALUE=0
  RESPOND PREFIX=SA MSG="HOMED=0"

# Setters
[gcode_macro SA_SET_Z_CAKE]
gcode:
  {% set c = params.CAKE|int %}
  {% set s = params.STEPS|int %}
  SET_GCODE_VARIABLE MACRO=SA_CFG VARIABLE={"z_cake" ~ c} VALUE={s}
  RESPOND PREFIX=SA MSG="Z_CAKE{c}_SET={s}"

[gcode_macro SA_SET_X_CENTER]
gcode:
  {% set s = params.STEPS|int %}
  SET_GCODE_VARIABLE MACRO=SA_CFG VARIABLE=x_center VALUE={s}
  RESPOND PREFIX=SA MSG="X_CENTER_SET={s}"

[gcode_macro SA_SET_X_CENTER_TO_RIGHT]
gcode:
  {% set s = params.STEPS|int %}
  SET_GCODE_VARIABLE MACRO=SA_CFG VARIABLE=x_center_to_right VALUE={s}
  RESPOND PREFIX=SA MSG="X_CENTER_TO_RIGHT_SET={s}"

[gcode_macro SA_SET_CAKE_SLOT]
gcode:
  {% set c = params.CAKE|int %}
  {% set s = params.STEPS|int %}
  SET_GCODE_VARIABLE MACRO=SA_CFG VARIABLE={"cake" ~ c ~ "_slot"} VALUE={s}
  RESPOND PREFIX=SA MSG="CAKE{c}_SLOT_SET={s}"

# Jog (now using G1 for X/Z)
[gcode_macro SA_GANTRY_JOG]
gcode:
  SA_REQUIRE_HOMED
  {% set d = params.DELTA|int %}
  G91
  G1 Z{d} F2000
  G90
  RESPOND PREFIX=SA MSG="GANTRY_JOG={d}"

[gcode_macro SA_HORIZ_JOG]
gcode:
  SA_REQUIRE_HOMED
  {% set d = params.DELTA|int %}
  G91
  G1 X{d} F4000
  G90
  RESPOND PREFIX=SA MSG="HORIZ_JOG={d}"

# Go-to primitives (still “soft absolute” in chosen coordinate units)
[gcode_macro SA_GOTO_CAKE]
gcode:
  SA_REQUIRE_HOMED
  {% set c = params.CAKE|int %}
  {% set z = printer["gcode_macro SA_CFG"]["z_cake" ~ c]|int %}
  G90
  G1 Z{z} F2000
  RESPOND PREFIX=SA MSG="Z_AT_CAKE{c}={z}"

[gcode_macro SA_GOTO_Z0]
gcode:
  SA_REQUIRE_HOMED
  G90
  G1 Z0 F2000
  RESPOND PREFIX=SA MSG="Z_AT_0"

[gcode_macro SA_GOTO_X]
gcode:
  SA_REQUIRE_HOMED
  {% set pos = params.POS|upper %}
  {% set xc = printer["gcode_macro SA_CFG"].x_center|int %}
  {% set xr = printer["gcode_macro SA_CFG"].x_center_to_right|int %}
  {% if pos == "LEFT" %}
    G90
    G1 X0 F4000
    RESPOND PREFIX=SA MSG="X_AT_LEFT"
  {% elif pos == "CENTER" %}
    G90
    G1 X{xc} F4000
    RESPOND PREFIX=SA MSG="X_AT_CENTER={xc}"
  {% elif pos == "RIGHT" %}
    G90
    G1 X{xc + xr} F4000
    RESPOND PREFIX=SA MSG="X_AT_RIGHT"
  {% else %}
    {action_raise_error("POS must be LEFT|CENTER|RIGHT")}
  {% endif %}

# Cake moves (still manual_stepper)
[gcode_macro _SA_CAKE_MOVE]
gcode:
  {% set c = params.CAKE|int %}
  {% set d = params.DELTA|int %}
  MANUAL_STEPPER STEPPER={"cake" ~ c} SET_POSITION=0
  MANUAL_STEPPER STEPPER={"cake" ~ c} MOVE={d} SPEED=15000 ACCEL=30000
  M400
  MANUAL_STEPPER STEPPER={"cake" ~ c} SET_POSITION=0

[gcode_macro SA_CAKE_STEP]
gcode:
  SA_REQUIRE_HOMED
  {% set c = params.CAKE|int %}
  {% set dir = params.DIR|default("CW")|upper %}
  {% set slot = printer["gcode_macro SA_CFG"]["cake" ~ c ~ "_slot"]|int %}
  {% if dir == "CW" %}
    _SA_CAKE_MOVE CAKE={c} DELTA={slot}
  {% else %}
    _SA_CAKE_MOVE CAKE={c} DELTA={-slot}
  {% endif %}
  RESPOND PREFIX=SA MSG="CAKE{c}_STEP_{dir}={slot}"

[gcode_macro SA_DISPENSE_TEST]
gcode:
  SA_REQUIRE_HOMED
  {% set c = params.CAKE|default(1)|int %}
  {% set dir = params.DIR|default("CW")|upper %}
  RESPOND PREFIX=SA MSG="DISPENSE_START CAKE={c} DIR={dir}"
  SA_GOTO_X POS=CENTER
  SA_GOTO_CAKE CAKE={c}
  SA_CAKE_STEP CAKE={c} DIR={dir}
  SA_GOTO_Z0
  SA_GOTO_X POS=RIGHT
  RESPOND PREFIX=SA MSG="DISPENSE_DONE"